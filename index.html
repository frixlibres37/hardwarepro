function initSupabase(){
    try{db=makeSupabaseClient(SUPABASE_URL,SUPABASE_KEY);return true;}
    catch(e){console.error(e);return false;}
}
function makeSupabaseClient(url,key){
    const H={'apikey':key,'Authorization':'Bearer '+key,'Content-Type':'application/json','Prefer':'return=representation'};
    function q(table){
        let _f=[],_s='*',_sing=false,_lim=null,_ord=null;
        const o={
            select(s){_s=s||'*';return o;},single(){_sing=true;return o;},
            order(c,op={}){_ord=c+(op.ascending===false?'.desc':'.asc');return o;},
            limit(n){_lim=n;return o;},
            eq(c,v){_f.push(c+'=eq.'+encodeURIComponent(v));return o;},
            neq(c,v){_f.push(c+'=neq.'+encodeURIComponent(v));return o;},
            async _go(method,body){
                let ep=url+'/rest/v1/'+table; let ps=[];
                if(method==='GET')ps.push('select='+encodeURIComponent(_s));
                _f.forEach(f=>ps.push(f)); if(_ord)ps.push('order='+_ord); if(_lim)ps.push('limit='+_lim);
                if(ps.length)ep+='?'+ps.join('&');
                const h={...H};if(_sing)h.Accept='application/vnd.pgrst.object+json';
                const opts={method,headers:h};if(body!==undefined)opts.body=JSON.stringify(body);
                try{
                    const r=await fetch(ep,opts); const t=await r.text();
                    let d=null;try{d=t?JSON.parse(t):null;}catch(e){}
                    if(!r.ok)return{data:null,error:{message:(d&&d.message)||r.statusText}};
                    return{data:d,error:null};
                }catch(e){return{data:null,error:{message:e.message}};}
            },
            then(resolve){return o._go('GET').then(resolve);},
            insert(data){const b=Array.isArray(data)?data:[data];return{select(){return this;},single(){_sing=true;return this;},then(resolve){return o._go('POST',b).then(resolve);}};},
            update(data){return{eq(c,v){_f.push(c+'=eq.'+encodeURIComponent(v));return this;},then(resolve){return o._go('PATCH',data).then(resolve);}};},
            upsert(data){
                const h2={...H,'Prefer':'return=representation,resolution=merge-duplicates'};
                const b=Array.isArray(data)?data:[data];
                return{then(resolve){let ep=url+'/rest/v1/'+table+'?select=*';_f.forEach(f=>ep+='&'+f);
                    return fetch(ep,{method:'POST',headers:h2,body:JSON.stringify(b)}).then(r=>r.text()).then(t=>{let d=null;try{d=t?JSON.parse(t):null;}catch(e){}return{data:d,error:null};}).catch(e=>({data:null,error:{message:e.message}}));}};
            },
            delete(){return{eq(c,v){_f.push(c+'=eq.'+encodeURIComponent(v));return this;},then(resolve){return o._go('DELETE').then(resolve);}};},
        };return o;
    }
    return{from:(t)=>q(t),channel:()=>({on:()=>({subscribe:()=>({})})}),auth:{getUser:async()=>({data:{user:null}})}};
}

        <div style="font-size:10px;color:var(--txt2);">Stock: ${p.stock}</div>
    </div>`).join('');
}
function fprod(q){
    const cat=document.getElementById('pos-cat').value;
    let list=prods.filter(p=>p.status==='active');
    if(q) list=list.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())||p.code.toLowerCase().includes(q.toLowerCase()));
    if(cat) list=list.filter(p=>p.cat===cat);
    rpg(list);
}
function spm(m){
    selPM=m;
    ['cash','debit','bank','ewallet'].forEach(k=>
        document.getElementById('pm-'+k).classList.toggle('sel',k===m)
    );
    document.getElementById('ref-wrap').style.display=m!=='cash'?'block':'none';
    const cashRow=document.getElementById('c-change-row');
    if(cashRow) cashRow.style.display=m==='cash'?'flex':'none';
    if(m==='cash') setTimeout(()=>document.getElementById('cash-received')?.focus(),50);
    rcart();
}
function addCart(id){
    const p=prods.find(x=>x.id===id);if(!p||p.stock===0){toast('Out of stock!');return;}
    const ex=cart.find(c=>c.id===id);
    if(ex){if(ex.qty>=p.stock){toast('Max stock!');return;}ex.qty++;}
    else cart.push({id,name:p.name,code:p.code,price:p.price,cost:p.cost,qty:1,unit:p.unit});
    rcart();
}
function chQty(id,d){
    const c=cart.find(x=>x.id===id);
    const p=prods.find(x=>x.id===id);
    if(!c)return;
    const isWeight=p&&['kg','g','m','L','liter','litre','ml'].some(u=>p.unit.toLowerCase().includes(u.toLowerCase()));
    const step=isWeight?0.5:1;
    const maxAvail=p?(p.stock+c.qty):9999;
    const next=Math.round((c.qty+(d*step))*100)/100;
    if(next<=0){
        cart=cart.filter(x=>x.id!==id);
    } else if(next>maxAvail){
        c.qty=maxAvail;
        toast('Max available: '+maxAvail+' '+((p&&p.unit)||''));
    } else {
        c.qty=next;
    }
    rcart();
}
function removeFromCart(id){cart=cart.filter(x=>x.id!==id);rcart();}
function rcart(){
    const disc=parseFloat(document.getElementById('c-disc').value)||0;
    const sub=cart.reduce((s,c)=>s+c.price*c.qty,0);const tot=Math.max(0,sub-disc);
    document.getElementById('cc-cnt').textContent='('+cart.reduce((s,c)=>s+c.qty,0)+')';
    document.getElementById('c-sub').textContent=fmt(sub);
    document.getElementById('c-tot').textContent=fmt(tot);
    
    if(selPM==='cash'){
        const recv=parseFloat(document.getElementById('cash-received')?.value)||0;
        const chg=recv-tot;
        const chgEl=document.getElementById('c-change');
        if(chgEl){
            if(recv<=0){ chgEl.textContent='—'; chgEl.style.color='#6b7280'; }
            else if(chg<0){ chgEl.textContent='Short '+fmt(Math.abs(chg)); chgEl.style.color='#dc2626'; }
            else { chgEl.textContent=fmt(chg); chgEl.style.color='#16a34a'; }
        }
    }
    
    const cl=document.getElementById('cart-list');
    if(!cart.length){cl.innerHTML='<div style="padding:12px;text-align:center;color:var(--txt2);font-size:11px;">Tap a product to add</div>';return;}
    cl.innerHTML=cart.map(c=>`<div style="display:flex;align-items:center;gap:5px;padding:7px 5px;border-bottom:1px solid #f3f4f6;">
        <div style="flex:1;min-width:0;">
            <div style="font-size:12px;font-weight:600;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c.name}</div>
            <div style="font-size:10px;color:#6b7280;">${fmt(c.price)} / ${c.unit}</div>
        </div>
        <div style="display:flex;align-items:center;gap:3px;flex-shrink:0;">
            <button onclick="chQty(${c.id},-1)" style="width:24px;height:24px;border:1px solid #d1d5db;border-radius:5px;background:#f9fafb;cursor:pointer;color:#374151;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;">−</button>
            <input type="number" value="${c.qty}" min="0.01" step="0.01" style="width:48px;height:24px;text-align:center;font-size:12px;font-weight:700;border:1px solid #d1d5db;border-radius:5px;color:#111827;background:#fff;" readonly>
            <button onclick="chQty(${c.id},1)" style="width:24px;height:24px;border:1px solid #d1d5db;border-radius:5px;background:#f9fafb;cursor:pointer;color:#374151;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;">+</button>
        </div>
        <div style="font-size:12px;font-weight:700;min-width:52px;text-align:right;color:#1a6b3c;">${fmt(c.price*c.qty)}</div>
        <button onclick="removeFromCart(${c.id})" style="border:none;background:none;cursor:pointer;color:#9ca3af;font-size:18px;line-height:1;padding:0 2px;flex-shrink:0;">×</button>
    </div>`).join('');
}
function clrcart(){cart=[];document.getElementById('c-disc').value=0;rcart();}

// ============ FIXED: CHECKOUT (RECORDS DRIFT & LOADING) ============
async function checkout(){
    if(!cart.length){toast('Cart is empty');return;}
    
    const disc=parseFloat(document.getElementById('c-disc').value)||0;
    const sub=cart.reduce((s,c)=>s+c.price*c.qty,0);
    const total=Math.max(0,sub-disc);
    
    const cashReceived = selPM === 'cash' ? (parseFloat(document.getElementById('cash-received')?.value) || 0) : 0;
    const cashChange = selPM === 'cash' ? Math.max(0, cashReceived - total) : 0;

    const custId=document.getElementById('cart-cust').value;
    const cust=custId?custs.find(c=>c.id==custId):null;
    const drno=getDRno();

    const txnData={
        drno, customer:cust?cust.first+' '+cust.last:'Walk-in', cust_id:cust?cust.id:null,
        delivery_addr:document.getElementById('cart-addr')?.value||'', note:document.getElementById('cart-note')?.value||'',
        subtotal:sub, discount:disc, total, payment_method:selPM, ref_no:document.getElementById('pm-ref')?.value||'',
        staff_name:curUser?curUser.name:'', status:'active',
        detail:cart.map(c=>({...c})), receipt_type:receiptType,
        cash_received:cashReceived, cash_change:cashChange, created_at:new Date().toISOString()
    };

    showLoading('Processing Transaction...');
    try{
        const {data:ins,error}=await db.from('transactions').insert(txnData).select().single();
        if(error) throw error;

        for(const item of cart){
            const p=prods.find(x=>x.id===item.id);
            if(p){
                p.stock=Math.max(0,p.stock-item.qty);
                await db.from('products').update({stock:p.stock}).eq('id',p.id);
            }
        }

        txns.push({...txnData, id:ins.id, ts:Date.now()});
        profile.drno++;
        await db.from('config').upsert([{key:'drno', value:String(profile.drno), updated_at:new Date().toISOString()}]);

        clrcart();
        ['cart-addr','cart-note','pm-ref','cash-received'].forEach(id=>{
            const el=document.getElementById(id); if(el) el.value='';
        });
        const chgEl=document.getElementById('c-change');
        if(chgEl){ chgEl.textContent='—'; chgEl.style.color='#6b7280'; }

        try{ fprod(document.getElementById('pos-si')?.value||''); }catch(e){}

        toast('✓ Sale Complete: '+drno);
        viewDR(ins.id);
    }catch(err){
        toast('❌ Transaction Failed: '+err.message,'err');
    }finally{
        hideLoading();
    }
}

function viewDR(id){
    const t=txns.find(x=>x.id===id);if(!t)return;
    const p=profile;
    const rows=t.detail.map((d,i)=>`<tr><td style="text-align:center;">${i+1}</td><td>${d.code||'—'}</td><td>${d.name}</td><td style="text-align:center;">${d.qty}</td><td style="text-align:center;">${d.unit||'pcs'}</td><td style="text-align:right;">${fmt(d.price)}</td><td style="text-align:right;">${fmt(d.price*d.qty)}</td></tr>`).join('');
    
    document.getElementById('dr-modal-title').textContent=t.drno;
    document.getElementById('dr-preview').innerHTML=`<div class="dr-wrap">
        <div class="dr-hd"><div style="display:flex;align-items:center;">${logoHTML(56,'10px',18)}<div>
            <div style="font-size:15px;font-weight:700;color:#1a6b3c;margin-left:10px;">${p.biz}</div>
            ${p.addr?`<div style="font-size:10px;color:#555;margin-left:10px;">${p.addr}</div>`:''}
        </div></div>
        <div style="text-align:right;"><div style="background:#1a6b3c;color:#fff;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;display:inline-block;">${t.receiptType||'DELIVERY RECEIPT'}</div>
            <div style="font-size:14px;font-weight:700;color:#1a6b3c;margin-top:3px;">${t.drno}</div>
            <div style="font-size:10px;color:#555;">${fmtD(t.ts)}</div>
        </div></div>
        
        <table class="dr-table"><thead><tr><th style="width:28px;text-align:center;">#</th><th style="width:60px;">Code</th><th>Description</th><th style="width:38px;text-align:center;">Qty</th><th style="width:38px;text-align:center;">Unit</th><th style="width:70px;text-align:right;">Price</th><th style="width:80px;text-align:right;">Amount</th></tr></thead><tbody>${rows}</tbody></table>
        
        <div style="display:flex;justify-content:flex-end;"><div style="width:190px;">
            <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:700;color:#1a6b3c;border-top:1.5px solid #1a6b3c;padding-top:4px;margin-top:3px;"><span>TOTAL</span><span>${fmt(t.total)}</span></div>
            ${(t.cashReceived>0)?`
            <div style="border-top:.5px dashed #ccc;margin-top:6px;padding-top:5px;">
                <div style="display:flex;justify-content:space-between;font-size:11px;color:#555;padding:1px 0;"><span>Cash Received</span><span>${fmt(t.cashReceived)}</span></div>
                <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:#16a34a;padding:2px 0;"><span>Change</span><span>${fmt(t.cashChange||0)}</span></div>
            </div>`:''}
        </div></div>
        <div style="margin-top:10px;border-top:.5px solid #ddd;padding-top:8px;font-size:10px;color:#888;text-align:center;">${p.footer}</div>
    </div>`;
    document.getElementById('mo-dr').classList.add('open');
}

// ============ INVENTORY & TABLES ============
function rInv(){
    const list=prods;
    document.getElementById('inv-tbl').innerHTML=list.map(p=>{
        const st=p.stock===0?'<span class="bdg bg-r">Out</span>':p.stock<=p.alert?'<span class="bdg bg-a">Low</span>':'<span class="bdg bg-g">OK</span>';
        return `<tr><td style="color:var(--g);font-weight:600;">${p.code}</td><td>${p.name}</td><td>${p.cat}</td><td>${fmt(p.price)}</td><td>${p.stock} ${p.unit} ${st}</td><td></td></tr>`;
    }).join('');
}
function rDRlist(){
    const list=[...txns].reverse();
    document.getElementById('dr-tbl').innerHTML=list.map(t=>`<tr>
        <td style="color:var(--g);font-weight:600;">${t.drno}</td><td>${t.customer}</td>
        <td><span class="bdg bg-b">${PMI[t.pm]} ${PML[t.pm]}</span></td>
        <td style="font-weight:600;">${fmt(t.total)}</td>
        <td><span class="bdg bg-g">Active</span></td><td>${fmtD(t.ts)}</td>
        <td><button class="btn btn-sm btn-p" onclick="viewDR(${t.id})">View/Print</button></td>
    </tr>`).join('')||'<tr><td colspan="7" style="color:var(--txt2);text-align:center;padding:10px;">No DRs yet</td></tr>';
}
function rCust(){
    document.getElementById('cust-list').innerHTML=custs.map(c=>`<div style="padding:10px; border-bottom:1px solid #ccc;">${c.first} ${c.last} - ${c.phone}</div>`).join('');
}
function rStaff(){
    document.getElementById('staff-list').innerHTML=users.map(u=>`<div style="padding:10px; border-bottom:1px solid #ccc;">${u.name} - ${u.role}</div>`).join('');
}

// ============ PROFILE UI ============
function rProfile(){
    const p = profile;
    const ev=(id,val)=>{const el=document.getElementById(id); if(el) el.innerHTML=val?`<span>${val}</span>`:'<span class="pf-empty">Not set</span>';};
    ev('pf-biz',p.biz);ev('pf-tagline',p.tagline);ev('pf-type',p.type);ev('pf-year',p.year);
    ev('pf-addr',p.addr);ev('pf-phone',p.phone);ev('pf-phone2',p.phone2);ev('pf-email',p.email);
    ev('pf-prefix',p.prefix);ev('pf-drno',p.drno);ev('pf-footer',p.footer);
    const lg = document.getElementById('profile-logo-display'); if(lg) lg.innerHTML = logoHTML(96,'16px',32);
    const ph = document.getElementById('ph-name'); if(ph) ph.textContent = p.biz;
}

function openProfileModal(){
    const p=profile;
    ['p-biz','p-tagline','p-addr','p-phone','p-phone2','p-email','p-fb','p-web','p-reg','p-tin','p-dti','p-footer','p-disclaimer'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=p[id.replace('p-','').replace('-','_')]||p[id.replace('p-','')]||'';});
    document.getElementById('p-prefix').value=p.prefix; document.getElementById('p-drno').value=p.drno;
    document.getElementById('p-initials').value=p.initials; document.getElementById('mo-profile').classList.add('open');
}
function switchPTab(idx){
    for(let i=0;i<5;i++){
        const tab=document.getElementById('ptab-'+i);const form=document.getElementById('pform-'+i);
        if(tab){tab.style.borderBottomColor=i===idx?'var(--g)':'transparent';tab.style.color=i===idx?'var(--g)':'var(--txt2)';}
        if(form) form.style.display=i===idx?'':'none';
    }
}

// ============ LOAD ALL DATA (FIXED INIT) ============
async function loadAllData(){
    showLoading('Connecting to database...');
    try {
        const {data:cfg} = await db.from('config').select('*');
        if(cfg){
            cfg.forEach(row=>{
                const k=row.key, v=row.value;
                if(k==='biz') profile.biz=v; else if(k==='logo_color') profile.logoColor=v;
                else if(k==='initials') profile.initials=v; else if(k==='drno') profile.drno=parseInt(v)||1001;
                else if(profile.hasOwnProperty(k)) profile[k]=v;
            });
        }

        const [pRes, uRes, cRes, tRes] = await Promise.all([
            db.from('products').select('*').order('name'),
            db.from('users').select('*'),
            db.from('customers').select('*'),
            db.from('transactions').select('*').order('created_at',{ascending:false}).limit(100)
        ]);

        if(pRes.data) prods=pRes.data.map(p=>({id:p.id,code:p.code||'',name:p.name,cat:p.category||'Other',price:parseFloat(p.price)||0,cost:parseFloat(p.cost)||0,stock:parseInt(p.stock)||0,alert:parseInt(p.alert_qty)||5,unit:p.unit||'pcs',status:p.status||'active'}));
        if(uRes.data) users=uRes.data.map(u=>({id:u.id,name:u.name,role:u.role,pin:u.pin,bg:u.bg||'#1a6b3c',color:u.color||'#fff'}));
        if(cRes.data) custs=cRes.data.map(c=>({id:c.id,first:c.first_name,last:c.last_name||'',phone:c.phone||'',addr:c.address||''}));
        if(tRes.data) txns=tRes.data.map(t=>({id:t.id,drno:t.drno,customer:t.customer||'Walk-in',total:parseFloat(t.total)||0,pm:t.payment_method||'cash',detail:t.detail||[],ts:new Date(t.created_at).getTime(),cashReceived:parseFloat(t.cash_received)||0,cashChange:parseFloat(t.cash_change)||0,receiptType:t.receipt_type||'DR'}));

        rProfile();
        document.getElementById('screen-login').style.display='flex';
        renderLoginUsers();
        renderPinDots();
    } catch(err) {
        console.error(err);
        toast('Connection Error','err');
        document.getElementById('screen-login').style.display='flex';
        renderLoginUsers();
    } finally {
        hideLoading();
    }
}

// Modal Handlers
document.querySelectorAll('.modal-ov').forEach(m=>{m.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});});

// Start App
if(initSupabase()){
    loadAllData();
} else {
    toast('Failed to init database', 'err');
}
</script>
