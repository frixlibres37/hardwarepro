function initSupabase(){

function makeSupabaseClient(url, key) {
    const H = {'apikey': key, 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json', 'Prefer': 'return=representation'};
    return {
        from: (table) => {
            let _f = [], _s = '*', _sing = false;
            const o = {
                select(s) { _s = s || '*'; return o; },
                single() { _sing = true; return o; },
                eq(c, v) { _f.push(c + '=eq.' + encodeURIComponent(v)); return o; },
                order(c, op = {}) { return o; },
                limit(n) { return o; },
                async _go(method, body) {
                    let ep = url + '/rest/v1/' + table;
                    let ps = ['select=' + encodeURIComponent(_s)];
                    _f.forEach(f => ps.push(f));
                    ep += '?' + ps.join('&');
                    const h = {...H};
                    if (_sing) h.Accept = 'application/vnd.pgrst.object+json';
                    const opts = {method, headers: h};
                    if (body !== undefined) opts.body = JSON.stringify(body);
                    const r = await fetch(ep, opts);
                    const t = await r.text();
                    let d = null; try { d = t ? JSON.parse(t) : null; } catch(e) {}
                    return {data: d, error: r.ok ? null : {message: d ? d.message : r.statusText}};
                },
                insert(data) { return o._go('POST', data); },
                upsert(data) {
                    const h2 = {...H, 'Prefer': 'resolution=merge-duplicates'};
                    return fetch(url + '/rest/v1/' + table, {method: 'POST', headers: h2, body: JSON.stringify(data)})
                        .then(r => ({data: r.ok, error: r.ok ? null : {message: 'Failed'}}));
                },
                update(data) { return o._go('PATCH', data); },
                then(res) { return o._go('GET').then(res); }
            };
            return o;
        },
        channel: () => ({ on: () => ({ subscribe: () => ({}) }) })
    };
}

// ============ POS CHECKOUT (FIXED) ============
async function checkout() {
    if (!cart.length) { toast('Cart is empty'); return; }
    showLoading('Processing Transaction...');

    const sub = cart.reduce((s, c) => s + c.price * c.qty, 0);
    const disc = parseFloat(document.getElementById('c-disc').value) || 0;
    const total = Math.max(0, sub - disc);
    
    const cash = parseFloat(document.getElementById('cash-received')?.value) || 0;
    const change = Math.max(0, cash - total);

    const txnData = {
        drno: profile.prefix + '-' + profile.drno,
        customer: 'Walk-in',
        total: total,
        payment_method: selPM,
        detail: cart.map(c => ({...c})),
        cash_received: cash,
        cash_change: change,
        created_at: new Date().toISOString()
    };

    try {
        const { data: ins, error } = await db.from('transactions').insert(txnData);
        if (error) throw error;

        profile.drno++;
        await db.from('config').upsert([{key:'drno', value:String(profile.drno)}]);
        
        txns.push({...txnData, id: Date.now()});
        clrcart();
        toast('✅ Sale Recorded');
    } catch (err) {
        toast('❌ Transaction Error', 'err');
    } finally {
        hideLoading(); // THE FIX: Always hide
    }
}
